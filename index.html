<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Startseite</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    .container {
      text-align: center;
      padding: 50px 30px;
      max-width: 900px;
      width: 90%;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 400;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    p {
      margin-bottom: 40px;
      opacity: 0.9;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 20px;
      text-decoration: none;
      color: white;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
      background: rgba(255,255,255,0.18);
    }

    .card img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid rgba(255,255,255,0.3);
    }

    .card p {
      margin: 0;
      font-weight: 500;
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      opacity: 0.6;
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>Willkommen 👋</h1>
    <h2>Meine Startseite</h2>
    <p>Wähle eine Plattform aus, um mein Profil zu besuchen</p>

    <div class="links">
      <a href="./Websites/Scratch.html" class="card">
        <img src="https://cdn2.scratch.mit.edu/get_image/user/164025705_90x90.png" alt="Scratch">
        <p>Scratch Profil</p>
      </a>

      <a href="./Websites/PlanetMinecraft.html" class="card">
        <img src="https://static.planetminecraft.com/files/avatar/5534307_1.jpg" alt="Planet Minecraft">
        <p>Planet Minecraft Profil</p>
      </a>
    </div>

    <footer>
      kein © 2026 dem13wi_2 - nicht Alle Rechte vorbehalten
    </footer>
  </div>

</body>
</html>
