<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>dem13wi_2 Scratch</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: radial-gradient(circle at top left, #5b21b6 0%, #4f46e5 25%, #1e3a8a 60%, #0f172a 100%);
    color: #f8fafc;
    overflow-x: hidden;
}

.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(15, 23, 42, 0.94);
    backdrop-filter: blur(14px);
    padding: 16px 28px;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 6px 30px rgba(15, 23, 42, 0.4);
}

.navbar .logo {
    font-size: 1.75em;
    font-weight: 800;
    color: #f8fafc;
}

.navbar ul {
    display: flex;
    gap: 14px;
    margin: 0;
    padding: 0;
    list-style: none;
}

.navbar ul li a {
    color: #e0e7ff;
    text-decoration: none;
    padding: 12px 18px;
    border-radius: 999px;
    transition: background 0.25s ease, transform 0.25s ease;
}

.navbar ul li a:hover {
    background: rgba(167, 139, 250, 0.24);
    transform: translateY(-1px);
}

.container {
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr);
    gap: 40px;
    align-items: center;
    min-height: 100vh;
    padding: 110px 40px 40px;
}

.profile img {
    width: 100%;
    max-width: 260px;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 34px;
    border: 6px solid rgba(255, 255, 255, 0.9);
    box-shadow: 0 24px 56px rgba(15, 23, 42, 0.24);
}

.content h1 {
    font-size: clamp(2.8rem, 4vw, 4rem);
    margin: 0 0 16px;
    color: #f8fafc;
}

.content p {
    font-size: 1.05rem;
    line-height: 1.85;
    max-width: 640px;
    margin: 0 0 24px;
    color: #dbeafe;
}

.button {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 28px;
    background: linear-gradient(135deg, #8b5cf6, #22d3ee);
    color: #ffffff;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 700;
    letter-spacing: 0.02em;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow: 0 18px 40px rgba(139, 92, 246, 0.24);
}

.button:hover {
    transform: translateY(-2px);
    box-shadow: 0 22px 44px rgba(139, 92, 246, 0.3);
}

.projects {
    background: linear-gradient(180deg, rgba(17, 24, 39, 0.98), rgba(79, 70, 229, 0.18));
    color: #f8fafc;
    padding: 46px;
    margin-top: -44px;
    border-radius: 34px 34px 20px 20px;
    position: relative;
    z-index: 1;
    box-shadow: 0 28px 80px rgba(15, 23, 42, 0.28);
    border: 1px solid rgba(167, 139, 250, 0.22);
}

.projects h2 {
    text-align: center;
    font-size: clamp(2.2rem, 3vw, 3rem);
    margin-bottom: 30px;
    letter-spacing: -0.03em;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 26px;
}

.card {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(167, 139, 250, 0.28);
    border-radius: 28px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    box-shadow: 0 18px 44px rgba(15, 23, 42, 0.18);
    backdrop-filter: blur(10px);
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 28px 64px rgba(15, 23, 42, 0.24);
    border-color: rgba(34, 197, 94, 0.35);
}

.card img {
    width: 100%;
    display: block;
    height: 170px;
    object-fit: cover;
}

.card-info {
    padding: 22px;
}

.card-info b {
    display: block;
    margin-bottom: 10px;
    font-size: 1.05rem;
    color: #f8fafc;
}

.card-info span {
    color: #c7d2fe;
}

.player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(8, 20, 47, 0.94);
    display: none;
    flex-direction: column;
    z-index: 2000;
}

.player iframe {
    flex: 1;
    width: 100%;
    border: none;
    min-height: 300px;
}

.controls {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    background: rgba(15, 23, 42, 0.96);
    padding: 16px;
}

button {
    padding: 12px 24px;
    margin: 0;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    background: linear-gradient(135deg, #8b5cf6, #22d3ee);
    color: white;
    font-weight: 700;
    transition: transform 0.25s ease, filter 0.25s ease;
}

button:hover {
    transform: translateY(-1px);
    filter: brightness(1.08);
}

.comments {
    background: linear-gradient(180deg, rgba(17, 24, 39, 0.96), rgba(79, 70, 229, 0.16));
    padding: 42px;
    color: #f8fafc;
    border-radius: 30px;
    border: 1px solid rgba(167, 139, 250, 0.2);
}

.comments h2 {
    margin-top: 0;
}

textarea {
    width: 100%;
    height: 110px;
    border-radius: 20px;
    border: 1px solid rgba(148, 163, 184, 0.28);
    padding: 16px;
    margin-bottom: 18px;
    background: rgba(15, 23, 42, 0.88);
    color: #e2e8f0;
    resize: vertical;
}

.comment {
    background: rgba(15, 23, 42, 0.88);
    padding: 18px;
    border-radius: 20px;
    margin-top: 14px;
    border: 1px solid rgba(148, 163, 184, 0.18);
}

.footer {
    background: rgba(15, 23, 42, 0.96);
    color: #e2e8f0;
    text-align: center;
    padding: 22px;
    font-size: 0.95em;
}

@media (max-width: 900px) {
    .container {
        grid-template-columns: 1fr;
        padding: 100px 26px 24px;
    }

    .profile img {
        max-width: 220px;
        margin: 0 auto;
    }
}

@media (max-width: 640px) {
    .navbar {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
    }

    .navbar ul {
        justify-content: center;
        flex-wrap: wrap;
    }

    .projects,
    .comments {
        padding: 28px 20px;
    }
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo"><i class="fas fa-gamepad"></i> dem13wi_2</div>
    <ul>
        <li><a href="#profile"><i class="fas fa-user"></i> Profil</a></li>
        <li><a href="#projects"><i class="fas fa-gamepad"></i> Spiele</a></li>
        <li><a href="#infos"><i class="fas fa-info-circle"></i> Infos</a></li>
    </ul>
</nav>

<div class="container" id="profile">
    <div class="profile">
        <img src="https://cdn2.scratch.mit.edu/get_image/user/164025705_90x90.png">
    </div>

    <div class="content">
        <h1>Hallo</h1>
        <p>Ich bin <b>dem13wi_2</b></p>
        <a class="button" href="https://scratch.mit.edu/users/dem13wi_2/" target="_blank">
            <i class="fas fa-external-link-alt"></i> Mein Scratch Profil
        </a>
    </div>
</div>

<div class="projects" id="projects">
    <h2>🎮 Meine Spiele</h2>
    <div class="grid" id="projects-grid"></div>
</div>

<div class="player" id="player">
    <iframe id="frame"></iframe>
    <div class="controls">
        <button onclick="closePlayer()">❌ Schließen</button>
    </div>
</div>

<div class="comments" id="infos">
    <h2>Infos</h2>
    <p>Colle Andere Scratcher (deutsche) = <a href="https://scratch.mit.edu/users/Schraubethepigeon/" target="_blank">@Schraubethepigeon</a></p>
    <p>Colle Andere Accouts Von Mir = <a href="https://www.planetminecraft.com/member/dem13wi_original/" target="_blank">Planet Minecraft Dem13wi_original</a></p>
</div>

<footer class="footer">
    <p>kein © 2026 dem13wi_2 - nicht Alle Rechte vorbehalten<i class="fas fa-heart"></i></p>
</footer>

<script>
const username = "dem13wi_2";
const container = document.getElementById("projects-grid");

async function loadProjects() {
    try {
        const url = `https://api.scratch.mit.edu/users/${username}/projects`;
        const proxyUrl = `https://corsproxy.io/?${url}`;
        const res = await fetch(proxyUrl);
        const data = await res.json();

        data.forEach(p => {
            const card = document.createElement("div");
            card.className = "card";

            const title = p.title || "Kein Titel";
            const views = p.stats?.views ?? 0;
            const image = p.image || `https://cdn2.scratch.mit.edu/get_image/project/${p.id}_480x360.png`;

            card.innerHTML = `
                <img src="${image}">
                <div class="card-info">
                    <b>${title}</b><br>
                    👁 ${views}
                </div>
            `;

            card.onclick = () => openProject(p.id);
            container.appendChild(card);
        });

    } catch (err) {
        container.innerHTML = "<p>⚠️ Projekte konnten nicht geladen werden.</p>";
        setTimeout(() => {
            window.location.href = "./error.html";
        }, 1000);
    }
}

function openProject(id){
    document.getElementById("player").style.display = "flex";
    document.getElementById("frame").src = `https://turbowarp.org/${id}/embed`;
}

function closePlayer(){
    document.getElementById("player").style.display = "none";
    document.getElementById("frame").src = "";
}

loadProjects();
</script>

</body>
</html>
