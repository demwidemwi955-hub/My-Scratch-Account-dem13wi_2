<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>dem13wi_2 Scratch</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
    --bg1: #e0f7ff;
    --bg2: #fff7e6;
    --card: #ffffff;
    --text: #1b1b1b;
    --accent: #4f46e5;
    --accent2: #06b6d4;
    --shadow: rgba(0,0,0,0.1);
}

/* BODY */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color: var(--text);
    overflow-x: hidden;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(12px);
    padding: 10px 20px;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 10px var(--shadow);
    color: var(--text);
}

.navbar .logo {
    font-size: 1.5em;
    font-weight: bold;
}

.navbar ul li a {
    color: var(--text);
    text-decoration: none;
    padding: 10px;
    border-radius: 8px;
    transition: 0.3s;
}

.navbar ul li a:hover {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
}

/* PROFILE */
.profile img {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 6px solid white;
    box-shadow: 0 10px 25px var(--shadow);
    animation: float 3s ease-in-out infinite;
}

/* CONTENT */
.content h1 {
    font-size: 3em;
    margin-bottom: 10px;
}

/* BUTTON */
.button {
    display: inline-block;
    padding: 12px 20px;
    margin-top: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border-radius: 12px;
    text-decoration: none;
    transition: 0.3s;
    box-shadow: 0 6px 15px var(--shadow);
}

.button:hover {
    transform: translateY(-2px);
    filter: brightness(1.1);
}

/* PROJECTS */
.projects {
    background: rgba(255,255,255,0.8);
    color: var(--text);
    padding: 40px;
    margin-top: -50px;
    border-radius: 25px 25px 0 0;
    backdrop-filter: blur(10px);
}

.card {
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 8px 20px var(--shadow);
}

.card:hover {
    transform: scale(1.05);
}

.card-info {
    padding: 10px;
    color: var(--text);
}

/* PLAYER */
.player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.95);
    display: none;
    flex-direction: column;
    z-index: 2000;
}

/* CONTROLS */
.controls {
    background: white;
    padding: 10px;
    text-align: center;
    box-shadow: 0 -2px 10px var(--shadow);
}

button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    transition: 0.3s;
}

button:hover {
    filter: brightness(1.1);
}

/* COMMENTS / INFOS */
.comments {
    background: rgba(255,255,255,0.8);
    padding: 40px;
    color: var(--text);
}

textarea {
    width: 100%;
    height: 100px;
    border-radius: 12px;
    border: none;
    padding: 10px;
    background: white;
    box-shadow: 0 5px 15px var(--shadow);
}

/* FOOTER */
.footer {
    background: white;
    color: var(--text);
    text-align: center;
    padding: 20px;
    font-size: 0.9em;
    box-shadow: 0 -2px 10px var(--shadow);
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo"><i class="fas fa-gamepad"></i> dem13wi_2</div>
    <ul>
        <li><a href="#profile"><i class="fas fa-user"></i> Profil</a></li>
        <li><a href="#projects"><i class="fas fa-gamepad"></i> Spiele</a></li>
        <li><a href="#infos"><i class="fas fa-info-circle"></i> Infos</a></li>
    </ul>
</nav>

<div class="container" id="profile">
    <div class="profile">
        <img src="https://cdn2.scratch.mit.edu/get_image/user/164025705_90x90.png">
    </div>

    <div class="content">
        <h1>Hallo</h1>
        <p>Ich bin <b>dem13wi_2</b></p>
        <a class="button" href="https://scratch.mit.edu/users/dem13wi_2/" target="_blank">
            <i class="fas fa-external-link-alt"></i> Mein Scratch Profil
        </a>
    </div>
</div>

<div class="projects" id="projects">
    <h2>🎮 Meine Spiele</h2>
    <div class="grid" id="projects-grid"></div>
</div>

<div class="player" id="player">
    <iframe id="frame"></iframe>
    <div class="controls">
        <button onclick="closePlayer()">❌ Schließen</button>
    </div>
</div>

<div class="comments" id="infos">
    <h2>Infos</h2>
    <p>Colle Andere Scratcher (deutsche) = <a href="https://scratch.mit.edu/users/Schraubethepigeon/" target="_blank">@Schraubethepigeon</a></p>
    <p>Colle Andere Accouts Von Mir = <a href="https://www.planetminecraft.com/member/dem13wi_original/" target="_blank">Planet Minecraft Dem13wi_original</a></p>
</div>

<footer class="footer">
    <p>kein © 2026 dem13wi_2 - nicht Alle Rechte vorbehalten<i class="fas fa-heart"></i></p>
</footer>

<script>
const username = "dem13wi_2";
const container = document.getElementById("projects-grid");

async function loadProjects() {
    try {
        const url = `https://api.scratch.mit.edu/users/${username}/projects`;
        const proxyUrl = `https://corsproxy.io/?${url}`;
        const res = await fetch(proxyUrl);
        const data = await res.json();

        data.forEach(p => {
            const card = document.createElement("div");
            card.className = "card";

            const title = p.title || "Kein Titel";
            const views = p.stats?.views ?? 0;
            const image = p.image || `https://cdn2.scratch.mit.edu/get_image/project/${p.id}_480x360.png`;

            card.innerHTML = `
                <img src="${image}">
                <div class="card-info">
                    <b>${title}</b><br>
                    👁 ${views}
                </div>
            `;

            card.onclick = () => openProject(p.id);
            container.appendChild(card);
        });

    } catch (err) {
        container.innerHTML = "<p>⚠️ Projekte konnten nicht geladen werden.</p>";
        setTimeout(() => {
            window.location.href = "./error.html";
        }, 1000);
    }
}

function openProject(id){
    document.getElementById("player").style.display = "flex";
    document.getElementById("frame").src = `https://turbowarp.org/${id}/embed`;
}

function closePlayer(){
    document.getElementById("player").style.display = "none";
    document.getElementById("frame").src = "";
}

loadProjects();
</script>

</body>
</html>
