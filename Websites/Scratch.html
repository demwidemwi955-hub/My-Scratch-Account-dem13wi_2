<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>dem13wi_2 Scratch</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: radial-gradient(circle at top, #eaf6ff 0%, #d4e8ff 40%, #f7f9fc 100%);
    color: #14213d;
    overflow-x: hidden;
}

.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(15, 42, 77, 0.95);
    backdrop-filter: blur(12px);
    padding: 12px 24px;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 20px rgba(20, 33, 61, 0.2);
}

.navbar .logo {
    font-size: 1.5em;
    font-weight: 700;
    color: #f1f1f1;
}

.navbar ul {
    display: flex;
    gap: 12px;
    margin: 0;
    padding: 0;
    list-style: none;
}

.navbar ul li a {
    color: #f5f7ff;
    text-decoration: none;
    padding: 10px 14px;
    border-radius: 999px;
    transition: background 0.25s ease, transform 0.25s ease;
}

.navbar ul li a:hover {
    background: rgba(255, 255, 255, 0.14);
    transform: translateY(-1px);
}

.container {
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr);
    gap: 40px;
    align-items: center;
    min-height: 100vh;
    padding: 90px 40px 40px;
}

.profile img {
    width: 100%;
    max-width: 260px;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 30px;
    border: 6px solid rgba(255,255,255,0.9);
    box-shadow: 0 18px 40px rgba(20, 33, 61, 0.14);
}

.content h1 {
    font-size: clamp(2.4rem, 4vw, 3.6rem);
    margin: 0 0 14px;
    color: #0f172a;
}

.content p {
    font-size: 1.05rem;
    line-height: 1.8;
    max-width: 620px;
    margin: 0 0 20px;
}

.button {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    background: linear-gradient(135deg, #2a6f95, #62b2e3);
    color: white;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 600;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow: 0 10px 25px rgba(42, 111, 149, 0.2);
}

.button:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 30px rgba(42, 111, 149, 0.24);
}

.projects {
    background: #ffffff;
    color: #14213d;
    padding: 40px;
    margin-top: -40px;
    border-radius: 32px 32px 20px 20px;
    position: relative;
    z-index: 1;
    box-shadow: 0 24px 60px rgba(20, 33, 61, 0.08);
}

.projects h2 {
    text-align: center;
    font-size: clamp(2rem, 3vw, 2.8rem);
    margin-bottom: 24px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 24px;
}

.card {
    background: #f5fbff;
    border-radius: 24px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow: 0 14px 24px rgba(20, 33, 61, 0.08);
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 34px rgba(20, 33, 61, 0.12);
}

.card img {
    width: 100%;
    display: block;
    height: 170px;
    object-fit: cover;
}

.card-info {
    padding: 18px;
    color: #16213d;
}

.player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10, 24, 44, 0.88);
    display: none;
    flex-direction: column;
    z-index: 2000;
}

.player iframe {
    flex: 1;
    width: 100%;
    border: none;
    min-height: 300px;
}

.controls {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    background: rgba(255,255,255,0.96);
    padding: 16px;
}

button {
    padding: 12px 24px;
    margin: 0;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    background: linear-gradient(135deg, #2a6f95, #62b2e3);
    color: white;
    font-weight: 700;
    transition: transform 0.25s ease, filter 0.25s ease;
}

button:hover {
    transform: translateY(-1px);
    filter: brightness(1.05);
}

.comments {
    background: #ffffff;
    padding: 40px;
    color: #14213d;
}

.comments h2 {
    margin-top: 0;
}

textarea {
    width: 100%;
    height: 110px;
    border-radius: 18px;
    border: 1px solid rgba(20, 33, 61, 0.12);
    padding: 14px;
    margin-bottom: 16px;
    background: #f4fbff;
    color: #14213d;
    resize: vertical;
}

.comment {
    background: #f4fbff;
    padding: 18px;
    border-radius: 18px;
    margin-top: 12px;
}

.footer {
    background: rgba(15, 42, 77, 0.95);
    color: #f5f7ff;
    text-align: center;
    padding: 22px;
    font-size: 0.95em;
}

@media (max-width: 900px) {
    .container {
        grid-template-columns: 1fr;
        padding: 100px 24px 24px;
    }

    .profile img {
        max-width: 220px;
        margin: 0 auto;
    }
}

@media (max-width: 640px) {
    .navbar {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
    }

    .navbar ul {
        justify-content: center;
        flex-wrap: wrap;
    }

    .projects,
    .comments {
        padding: 28px 20px;
    }
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo"><i class="fas fa-gamepad"></i> dem13wi_2</div>
    <ul>
        <li><a href="#profile"><i class="fas fa-user"></i> Profil</a></li>
        <li><a href="#projects"><i class="fas fa-gamepad"></i> Spiele</a></li>
        <li><a href="#infos"><i class="fas fa-info-circle"></i> Infos</a></li>
    </ul>
</nav>

<div class="container" id="profile">
    <div class="profile">
        <img src="https://cdn2.scratch.mit.edu/get_image/user/164025705_90x90.png">
    </div>

    <div class="content">
        <h1>Hallo</h1>
        <p>Ich bin <b>dem13wi_2</b></p>
        <a class="button" href="https://scratch.mit.edu/users/dem13wi_2/" target="_blank">
            <i class="fas fa-external-link-alt"></i> Mein Scratch Profil
        </a>
    </div>
</div>

<div class="projects" id="projects">
    <h2>🎮 Meine Spiele</h2>
    <div class="grid" id="projects-grid"></div>
</div>

<div class="player" id="player">
    <iframe id="frame"></iframe>
    <div class="controls">
        <button onclick="closePlayer()">❌ Schließen</button>
    </div>
</div>

<div class="comments" id="infos">
    <h2>Infos</h2>
    <p>Colle Andere Scratcher (deutsche) = <a href="https://scratch.mit.edu/users/Schraubethepigeon/" target="_blank">@Schraubethepigeon</a></p>
    <p>Colle Andere Accouts Von Mir = <a href="https://www.planetminecraft.com/member/dem13wi_original/" target="_blank">Planet Minecraft Dem13wi_original</a></p>
</div>

<footer class="footer">
    <p>kein © 2026 dem13wi_2 - nicht Alle Rechte vorbehalten<i class="fas fa-heart"></i></p>
</footer>

<script>
const username = "dem13wi_2";
const container = document.getElementById("projects-grid");

async function loadProjects() {
    try {
        const url = `https://api.scratch.mit.edu/users/${username}/projects`;
        const proxyUrl = `https://corsproxy.io/?${url}`;
        const res = await fetch(proxyUrl);
        const data = await res.json();

        data.forEach(p => {
            const card = document.createElement("div");
            card.className = "card";

            const title = p.title || "Kein Titel";
            const views = p.stats?.views ?? 0;
            const image = p.image || `https://cdn2.scratch.mit.edu/get_image/project/${p.id}_480x360.png`;

            card.innerHTML = `
                <img src="${image}">
                <div class="card-info">
                    <b>${title}</b><br>
                    👁 ${views}
                </div>
            `;

            card.onclick = () => openProject(p.id);
            container.appendChild(card);
        });

    } catch (err) {
        container.innerHTML = "<p>⚠️ Projekte konnten nicht geladen werden.</p>";
        setTimeout(() => {
            window.location.href = "./error.html";
        }, 1000);
    }
}

function openProject(id){
    document.getElementById("player").style.display = "flex";
    document.getElementById("frame").src = `https://turbowarp.org/${id}/embed`;
}

function closePlayer(){
    document.getElementById("player").style.display = "none";
    document.getElementById("frame").src = "";
}

loadProjects();
</script>

</body>
</html>
