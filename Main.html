<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>dem13wi_2 Scratch</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
}

/* TOP */
.container {
    display: flex;
    align-items: center;
    height: 100vh;
    padding: 50px;
}

.profile img {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 6px solid white;
}

.content {
    margin-left: 60px;
}

.projects {
    background: white;
    color: black;
    padding: 40px;
}

.projects h2 {
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #f5f5f5;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
}

.card-info {
    padding: 10px;
}

.player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    flex-direction: column;
}

.player iframe {
    flex: 1;
    width: 100%;
    border: none;
}

.controls {
    background: #111;
    padding: 10px;
    text-align: center;
}

button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <div class="profile">
        <img src="https://cdn2.scratch.mit.edu/get_image/user/164025705_90x90.png">
    </div>

    <div class="content">
        <h1>Hallo</h1>
        <p>Ich bin <b>dem13wi_2</b></p>
        <a class="button" href="https://scratch.mit.edu/users/dem13wi_2/" target="_blank">
            Mein Scratch Profil
        </a>
    </div>
</div>

<div class="projects">
    <h2>🎮 Meine Spiele</h2>
    <div class="grid" id="projects"></div>
</div>

<div class="player" id="player">
    <iframe id="frame"></iframe>
    <div class="controls">
        <button onclick="closePlayer()">❌ Schließen</button>
    </div>
</div>

<script>
const username = "dem13wi_2";
const container = document.getElementById("projects");

async function loadProjects() {
    try {
        const res = await fetch(`https://api.scratch.mit.edu/users/${username}/projects`);
        const data = await res.json();

        data.forEach(p => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <img src="https://uploads.scratch.mit.edu/get_image/project/${p.id}_480x360.png">
                <div class="card-info">
                    <b>${p.title}</b><br>
                    👁 ${p.stats.views}
                </div>
            `;

            card.onclick = () => openProject(p.id);
            container.appendChild(card);
        });

    } catch (err) {
        container.innerHTML = "<p>⚠️ Projekte konnten nicht geladen werden (CORS Problem)</p>";
        console.error(err);
    }
}

loadProjects();

function openProject(id){
    document.getElementById("player").style.display = "flex";
    document.getElementById("frame").src =
        `https://scratch.mit.edu/projects/${id}/embed`;
}

function closePlayer(){
    document.getElementById("player").style.display = "none";
    document.getElementById("frame").src = "";
}
</script>

</body>
</html>
